; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Shared settings
[common]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
board_build.partitions = min_spiffs.csv
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
lib_deps =
	mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display@^3.0.12
	adafruit/Adafruit GFX Library@^1.11.11
	bblanchon/ArduinoJson@^7.3.0
	arduino-libraries/NTPClient@^3.2.1
	knolleary/PubSubClient@^2.8
	h2zero/NimBLE-Arduino@^1.4.1

; Production build v1 (default): pio run
[env:release]
extends = common
build_flags = -DHW_VERSION='"v1"'

; Production build v2: pio run -e release-v2
[env:release-v2]
extends = common
build_flags = -DHW_VERSION='"v2"' -DHW_V2 -DSUPPORTS_ANIMATION

; Debug build v1: pio run -e debug
; Skips OTA checks, extra logging
[env:debug]
extends = common
build_flags = -DDEV_MODE -DHW_VERSION='"v1"'

; Debug build v2: pio run -e debug-v2
[env:debug-v2]
extends = common
build_flags = -DDEV_MODE -DHW_VERSION='"v2"' -DHW_V2 -DSUPPORTS_ANIMATION
